# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:15
    container_name: payment_db
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_password
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: payment_app
    command: >
      sh -c "uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://payment_user:payment_password@db:5432/payment_db
    depends_on:
      db:
        condition: service_healthy

  test:
    build: .
    container_name: payment_test
    command: >
      sh -c "pytest tests/ -v --cov=src --cov-report=term --cov-report=html"
    volumes:
      - .:/app
      - ./htmlcov:/app/htmlcov
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./test.db
    depends_on:
      - db

volumes:
  postgres_data: